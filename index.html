<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Практика позиционирования</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<article>
    <section class="logo logo-box1">
        <div class="circle"></div>
    </section>
    <section class="logo logo-box2">
        <div class="cube cube1"></div>
        <div class="cube cube2"></div>
        <div class="cube cube3"></div>
        <div class="cube cube4"></div>
    </section>
    <button class="buttonOpenModal">Открыть модальное окно</button>

    <div class="modalOverlay">
        <div class="modalWindow">
            <button class="buttonCloseModal">×</button>
            <h2>Модальное окно</h2>
            <p>
                Это пример модального окна. Оно открывается по кнопке и закрывается по крестику.
            </p>

            <div class="progressWrapper">
                <div class="progressBar">
                    <div class="progressText">Loading...</div>

                    <div class="progressClip">
                        <div class="progressText progressTextWhite">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</article>
</body>
</html>
